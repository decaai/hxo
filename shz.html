<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hand Gesture Sound System</title>
    <style>
        /* CSS Section */
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #0f172a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 800px;
        }

        .video-wrapper {
            position: relative;
            width: 640px;
            height: 480px;
            margin: 0 auto;
            background: #000;
            border-radius: 20px;
            overflow: hidden;
            border: 4px solid #334155;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        #webcam, #output_canvas {
            position: absolute;
            left: 0;
            top: 0;
            width: 640px;
            height: 480px;
            transform: rotateY(180deg); /* Mirror effect */
        }

        #status-card {
            margin-top: 25px;
            padding: 20px;
            background: #1e293b;
            border-radius: 15px;
            display: inline-block;
            min-width: 300px;
            border-bottom: 6px solid #10b981;
        }

        h1 { margin-bottom: 10px; font-weight: 300; }
        #gesture-text { font-size: 2.5rem; margin: 0; color: #10b981; text-transform: uppercase; }
        .loading-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>AI Hand Gesture Sound</h1>
        <div class="video-wrapper">
            <div id="loading" class="loading-overlay">Memuat Model AI...</div>
            <video id="webcam" autoplay playsinline></video>
            <canvas id="output_canvas"></canvas>
        </div>
        <div id="status-card">
            <h2 id="gesture-text">Inisialisasi...</h2>
        </div>
    </div>

    <!-- Import Mediapipe via CDN -->
    <script type="module">
        import { HandLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/vision_bundle.js";

        const video = document.getElementById("webcam");
        const canvasElement = document.getElementById("output_canvas");
        const canvasCtx = canvasElement.getContext("2d");
        const gestureText = document.getElementById("gesture-text");
        const loadingOverlay = document.getElementById("loading");

        let handLandmarker;
        let lastAudioTrigger = "";

        // Pengaturan Suara
        const sounds = {
            "MENUNJUK": new Audio("https://actions.google.com/sounds/v1/science_fiction/beep_hit.ogg"),
            "TELAPAK TERBUKA": new Audio("https://actions.google.com/sounds/v1/foley/wind_chime_single.ogg"),
            "JEMPOL OKE": new Audio("https://actions.google.com/sounds/v1/human_voices/applause.ogg")
        };

        async function init() {
            try {
                const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/wasm");
                handLandmarker = await HandLandmarker.createFromOptions(vision, {
                    baseOptions: {
                        modelAssetPath: `https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task`,
                        delegate: "GPU"
                    },
                    runningMode: "VIDEO",
                    numHands: 1
                });
                
                startCamera();
            } catch (error) {
                alert("Gagal memuat model: " + error);
            }
        }

        async function startCamera() {
            const constraints = { video: { width: 640, height: 480 } };
            const stream = await navigator.mediaDevices.getUserMedia(constraints);
            video.srcObject = stream;
            video.addEventListener("loadeddata", () => {
                loadingOverlay.style.display = "none";
                predictWebcam();
            });
        }

        function detectGesture(landmarks) {
            const thumbTip = landmarks[4];
            const indexTip = landmarks[8];
            const middleTip = landmarks[12];
            const ringTip = landmarks[16];
            const pinkyTip = landmarks[20];

            // 1. Logika Menunjuk (Hanya telunjuk yang naik)
            if (indexTip.y < landmarks[6].y && middleTip.y > landmarks[10].y && ringTip.y > landmarks[14].y) {
                return "MENUNJUK";
            }
            
            // 2. Logika Telapak Terbuka (Semua jari naik)
            if (indexTip.y < landmarks[6].y && middleTip.y < landmarks[10].y && pinkyTip.y < landmarks[18].y) {
                return "TELAPAK TERBUKA";
            }

            // 3. Logika Jempol (Jempol di atas jari lain secara horizontal/vertikal)
            if (thumbTip.y < landmarks[2].y && indexTip.y > landmarks[6].y && middleTip.y > landmarks[10].y) {
                return "JEMPOL OKE";
            }

            return "MENCARI TANGAN...";
        }

        async function predictWebcam() {
            canvasElement.width = video.videoWidth;
            canvasElement.height = video.videoHeight;
            
            let startTimeMs = performance.now();
            const results = await handLandmarker.detectForVideo(video, startTimeMs);

            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

            if (results.landmarks.length > 0) {
                const gesture = detectGesture(results.landmarks[0]);
                gestureText.innerText = gesture;

                // Cek trigger suara (hanya putar jika gestur baru dideteksi)
                if (gesture !== lastAudioTrigger && sounds[gesture]) {
                    // Reset suara agar bisa diputar berulang meski cepat
                    sounds[gesture].currentTime = 0; 
                    sounds[gesture].play().catch(e => console.log("Klik layar dulu untuk aktifkan audio"));
                    lastAudioTrigger = gesture;
                }
            } else {
                gestureText.innerText = "TIDAK ADA TANGAN";
                lastAudioTrigger = "";
            }

            window.requestAnimationFrame(predictWebcam);
        }

        // Mulai aplikasi
        init();
    </script>
</body>
</html>
