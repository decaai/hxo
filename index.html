<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Hand Gesture Recognition</title>
    <style>
        /* --- CSS SECTION --- */
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #0f172a;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            text-align: center;
            position: relative;
        }

        .video-wrapper {
            position: relative;
            width: 640px;
            height: 480px;
            background: #000;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 4px solid #334155;
        }

        #webcam, #output_canvas {
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            transform: rotateY(180deg); /* Mirror view */
        }

        #overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            transition: opacity 0.5s;
        }

        #start-btn {
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
            background: #10b981;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 15px -3px rgba(16, 185, 129, 0.4);
            transition: transform 0.2s, background 0.2s;
        }

        #start-btn:hover {
            background: #059669;
            transform: scale(1.05);
        }

        .status-box {
            margin-top: 30px;
            padding: 20px 40px;
            background: #1e293b;
            border-radius: 15px;
            border-bottom: 4px solid #10b981;
            min-width: 300px;
        }

        #gesture-text {
            font-size: 2rem;
            margin: 0;
            color: #10b981;
            letter-spacing: 2px;
        }

        .loading-text { margin-top: 15px; color: #94a3b8; }
    </style>
</head>
<body>

    <div class="container">
        <h1 style="font-weight: 300;">Hand Gesture <span style="color:#10b981; font-weight: 700;">Voice</span></h1>
        
        <div class="video-wrapper">
            <!-- Overlay untuk memulai (Syarat agar suara aktif) -->
            <div id="overlay">
                <button id="start-btn">AKTIFKAN SISTEM</button>
                <p class="loading-text" id="loading-msg">Klik tombol untuk memulai kamera & suara</p>
            </div>

            <video id="webcam" autoplay playsinline></video>
            <canvas id="output_canvas"></canvas>
        </div>

        <div class="status-box">
            <h2 id="gesture-text">SISTEM SIAP</h2>
        </div>
    </div>

    <!-- --- JAVASCRIPT SECTION --- -->
    <script type="module">
        import { HandLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/vision_bundle.js";

        const video = document.getElementById("webcam");
        const canvasElement = document.getElementById("output_canvas");
        const canvasCtx = canvasElement.getContext("2d");
        const gestureText = document.getElementById("gesture-text");
        const overlay = document.getElementById("overlay");
        const startBtn = document.getElementById("start-btn");
        const loadingMsg = document.getElementById("loading-msg");

        let handLandmarker;
        let lastGesture = "";
        let isSystemRunning = false;

        // 1. Fungsi Suara (Text-to-Speech)
        function speak(text) {
            // Batalkan suara yang sedang berjalan agar tidak tumpang tindih
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'id-ID'; 
            utterance.rate = 1.0;
            window.speechSynthesis.speak(utterance);
        }

        // 2. Inisialisasi Model Mediapipe
        async function initializeModel() {
            loadingMsg.innerText = "Mengunduh Model AI...";
            startBtn.style.display = "none";
            
            try {
                const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/wasm");
                handLandmarker = await HandLandmarker.createFromOptions(vision, {
                    baseOptions: {
                        modelAssetPath: `https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task`,
                        delegate: "GPU"
                    },
                    runningMode: "VIDEO",
                    numHands: 1
                });
                startCamera();
            } catch (err) {
                alert("Error: " + err);
            }
        }

        // 3. Jalankan Kamera
        async function startCamera() {
            const constraints = { video: { width: 640, height: 480 } };
            const stream = await navigator.mediaDevices.getUserMedia(constraints);
            video.srcObject = stream;
            video.addEventListener("loadeddata", () => {
                overlay.style.opacity = "0";
                setTimeout(() => overlay.style.display = "none", 500);
                isSystemRunning = true;
                predictWebcam();
            });
        }

        // 4. Logika Deteksi Pola Tangan
        function getGestureName(landmarks) {
            const thumbTip = landmarks[4];
            const indexTip = landmarks[8];
            const middleTip = landmarks[12];
            const ringTip = landmarks[16];
            const pinkyTip = landmarks[20];

            // Pola 1: Menunjuk (Hanya telunjuk tegak)
            if (indexTip.y < landmarks[6].y && middleTip.y > landmarks[10].y && ringTip.y > landmarks[14].y) {
                return "MENUNJUK";
            }
            
            // Pola 2: Telapak Terbuka (Semua jari tegak)
            if (indexTip.y < landmarks[6].y && middleTip.y < landmarks[10].y && pinkyTip.y < landmarks[18].y) {
                return "TELAPAK TERBUKA";
            }

            // Pola 3: Jempol Oke (Jempol ke atas, jari lain mengepal)
            if (thumbTip.y < landmarks[2].y && indexTip.y > landmarks[6].y && middleTip.y > landmarks[10].y) {
                return "JEMPOL OKE";
            }

            return null;
        }

        // 5. Loop Prediksi
        async function predictWebcam() {
            canvasElement.width = video.videoWidth;
            canvasElement.height = video.videoHeight;
            
            let startTimeMs = performance.now();
            const results = await handLandmarker.detectForVideo(video, startTimeMs);

            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

            if (results.landmarks && results.landmarks.length > 0) {
                const currentGesture = getGestureName(results.landmarks[0]);
                
                if (currentGesture && currentGesture !== lastGesture) {
                    gestureText.innerText = currentGesture;
                    speak(currentGesture); // Putar suara
                    lastGesture = currentGesture;
                }
            } else {
                gestureText.innerText = "MENUNGGU TANGAN...";
                lastGesture = "";
            }

            if (isSystemRunning) {
                window.requestAnimationFrame(predictWebcam);
            }
        }

        // Event Listener Tombol Start
        startBtn.addEventListener("click", () => {
            initializeModel();
        });
    </script>
</body>
</html>
